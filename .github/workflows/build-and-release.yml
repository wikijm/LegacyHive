name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Visual Studio Build Tools
        uses: microsoft/setup-msbuild@v2
      
      - name: Setup MSVC with vcvars
        shell: cmd
        run: |
          REM Find and run vcvars64.bat to set up the MSVC environment
          for /f "tokens=*" %%i in ('where vcvars64.bat') do set VCVARS=%%i
          if defined VCVARS (
            call "%VCVARS%"
          ) else (
            REM Fallback: try default path
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )
      
      - name: Compile on Windows
        shell: cmd
        run: |
          REM Set up MSVC environment
          for /f "tokens=*" %%i in ('where vcvars64.bat') do call "%%i"
          
          REM Compile with proper include and library paths
          cl /O2 /std:c++17 LegacyHive.cpp ^
            /link ntdll.lib userenv.lib advapi32.lib offreg.lib Rpcrt4.lib ^
            /out:LegacyHive.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: LegacyHive.exe
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/windows-build/LegacyHive.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
