name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v1.1
        with:
          vs-version: '17'
      
      - name: Install Windows SDK
        shell: powershell
        run: |
          # Install Windows SDK with Offline Registry support
          $sdkVersion = "10.0.22621.0"
          choco install windows-sdk-10.1 -y --no-progress
      
      - name: Compile on Windows
        shell: cmd
        run: |
          REM Set up MSVC environment
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          
          REM Compile with proper include and library paths
          cl /O2 /std:c++17 LegacyHive.cpp ^
            /link ntdll.lib userenv.lib advapi32.lib offreg.lib Rpcrt4.lib ^
            /out:LegacyHive.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: LegacyHive.exe
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/windows-build/LegacyHive.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
