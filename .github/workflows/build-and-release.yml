name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output-name: LegacyHive
          - os: windows-latest
            output-name: LegacyHive.exe
          - os: macos-latest
            output-name: LegacyHive
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile on Ubuntu
        if: runner.os == 'Linux'
        run: g++ -o ${{ matrix.output-name }} LegacyHive.cpp -std=c++17
      
      - name: Compile on Windows
        if: runner.os == 'Windows'
        run: g++ -o ${{ matrix.output-name }} LegacyHive.cpp -std=c++17
      
      - name: Compile on macOS
        if: runner.os == 'macOS'
        run: g++ -o ${{ matrix.output-name }} LegacyHive.cpp -std=c++17
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.output-name }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ubuntu-latest-build/LegacyHive
            artifacts/windows-latest-build/LegacyHive.exe
            artifacts/macos-latest-build/LegacyHive
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
